<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #4A0E25 0%, #6B1D3A 40%, #8B2E4F 100%);
    position: relative;
  }

  .glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    border-radius: 50%;
  }

  .card {
    text-align: center;
    position: relative; z-index: 1;
    padding: 60px 80px;
  }

  .label {
    font-size: 16px; font-weight: 400;
    letter-spacing: 8px; text-transform: uppercase;
    color: #E8D48B;
    margin-bottom: 24px;
  }

  .name {
    font-size: 96px; font-weight: 700;
    color: #FFFFFF;
    line-height: 1.1;
    margin-bottom: 8px;
    text-shadow: 0 2px 30px rgba(0,0,0,0.3);
    font-family: Georgia, serif;
    font-style: italic;
  }

  .age {
    font-size: 36px; font-weight: 300;
    color: #E8D48B;
    letter-spacing: 10px;
    margin-bottom: 36px;
  }

  .line {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, #C9A84C, transparent);
    margin: 0 auto 36px;
  }

  .details {
    font-size: 22px; font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.8;
  }

  .details strong {
    color: #E8D48B;
    font-weight: 600;
  }

  .corner { position: absolute; width: 80px; height: 80px; }
  .corner--tl { top: 30px; left: 30px; border-top: 2px solid #C9A84C; border-left: 2px solid #C9A84C; }
  .corner--tr { top: 30px; right: 30px; border-top: 2px solid #C9A84C; border-right: 2px solid #C9A84C; }
  .corner--bl { bottom: 30px; left: 30px; border-bottom: 2px solid #C9A84C; border-left: 2px solid #C9A84C; }
  .corner--br { bottom: 30px; right: 30px; border-bottom: 2px solid #C9A84C; border-right: 2px solid #C9A84C; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="card">
    <p class="label">Mерей Той</p>
    <h1 class="name">Гүлжанат</h1>
    <p class="age">50 ЖАС</p>
    <div class="line"></div>
    <p class="details">
      <strong>22 мамыр 2026</strong> &nbsp;|&nbsp; жұма &nbsp;|&nbsp; 18:00<br>
      Хромтау, Ресторан «Қазақстан»
    </p>
  </div>
</body>
</html>
